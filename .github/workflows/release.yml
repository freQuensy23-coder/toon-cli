name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: toon-cli-linux-amd64
            deb_arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: toon-cli-linux-arm64
            deb_arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: toon-cli-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: toon-cli-macos-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/toon-cli ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Package .deb
        if: matrix.deb_arch != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p pkg/usr/bin pkg/DEBIAN
          cp target/${{ matrix.target }}/release/toon-cli pkg/usr/bin/
          chmod +x pkg/usr/bin/toon-cli
          cat > pkg/DEBIAN/control << CTL
          Package: toon-cli
          Version: ${VERSION}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: freQuensy23-coder <frequensy23@gmail.com>
          Description: Blazing-fast JSON-to-TOON converter
          CTL
          sed -i 's/^          //' pkg/DEBIAN/control
          dpkg-deb --build pkg toon-cli_${VERSION}_${{ matrix.deb_arch }}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            *.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          # Download all artifacts and compute SHA256
          for ARTIFACT in toon-cli-macos-arm64 toon-cli-macos-amd64 toon-cli-linux-arm64 toon-cli-linux-amd64; do
            URL="https://github.com/freQuensy23-coder/toon-cli/releases/download/${TAG}/${ARTIFACT}"
            curl -sL "$URL" -o "$ARTIFACT"
            eval "SHA_${ARTIFACT//-/_}=$(sha256sum $ARTIFACT | cut -d' ' -f1)"
          done

          # Clone tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/freQuensy23-coder/homebrew-tap.git"
          cd homebrew-tap

          cat > Formula/toon-cli.rb << FORMULA
          class ToonCli < Formula
            desc "Blazing-fast JSON-to-TOON converter"
            homepage "https://github.com/freQuensy23-coder/toon-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/freQuensy23-coder/toon-cli/releases/download/${TAG}/toon-cli-macos-arm64"
                sha256 "${SHA_toon_cli_macos_arm64}"
              end
              on_intel do
                url "https://github.com/freQuensy23-coder/toon-cli/releases/download/${TAG}/toon-cli-macos-amd64"
                sha256 "${SHA_toon_cli_macos_amd64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/freQuensy23-coder/toon-cli/releases/download/${TAG}/toon-cli-linux-arm64"
                sha256 "${SHA_toon_cli_linux_arm64}"
              end
              on_intel do
                url "https://github.com/freQuensy23-coder/toon-cli/releases/download/${TAG}/toon-cli-linux-amd64"
                sha256 "${SHA_toon_cli_linux_amd64}"
              end
            end

            def install
              bin.install stable.url.split("/").last => "toon-cli"
            end

            test do
              pipe_output("#{bin}/toon-cli", '{"a":1}', 0)
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/toon-cli.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/toon-cli.rb
          git commit -m "Update toon-cli to ${VERSION}"
          git push
